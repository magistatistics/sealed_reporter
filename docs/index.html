<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sealed Reporter</title>
  <link rel="stylesheet" href="/sealed_reporter/static/css/dashboard.css">
</head>
<body>
  <main class="report-shell">
    <header class="report-header">
      <div class="report-title-wrap">
        <div>
          <h1>Sealed Reporter</h1>
          <p>Select a report to open its dashboard.</p>
        </div>
      </div>
    </header>

    <section class="report-index-grid">
      
        <a class="report-index-card" href="/sealed_reporter/report/tmt">
          <div class="report-index-cover" style="background-image: linear-gradient(180deg, rgba(6,11,22,0.18) 0%, rgba(6,11,22,0.82) 100%), url('https://images.ctfassets.net/0piqveu8x9oj/1tg20FUmA12O4OMvgwbXR6/312e6578c2e5dba83eece1c482d24dd1/TMT_prodpage_thumbnail.jpg')">
            
              <img class="report-index-set-symbol" src="https://svgs.scryfall.io/sets/tmt.svg?1772427600" alt="TMT symbol">
            
          </div>
          <div class="report-index-content">
            <h2>Teenage Mutant Ninja Turtles</h2>
            <p class="report-index-set-name">Teenage Mutant Ninja Turtles</p>
            <span class="report-index-set-code">TMT</span>
          </div>
        </a>
      
    </section>
  </main>
</body>
</html>
